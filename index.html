<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Luke's Website</title>

<!-- This is the main body of the website- ALL your content goes AFTER the <body> tag and before the </body> tag -->
<body>

    <!-- The Hero Section -------------------------------------------------------------------------------------- -->
    <section class="hero">
        <div class="hero-text">Luke's Website</div>
    </section>

<!-- Topic one ------------------------------------------------------------------------------------------------- -->
    <!-- The First Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->
        <div class="topic-title">
            <h1>Image creation</h1>
        </div>
        <!-- now a three column grid of images -->

            <!-- one "card" which includes an image with a text below it -->

                <img src="images/Ocean.png" alt="Ocean">
                <h2 class="topic-card-text">Ocean</h2>
            </div>
            <div class="topic-card">
                <img src="images/imagegrok7.PNG" alt="Aura monster">

            </div>  
            <div class="topic-card">
                <img src="images/Grokgif7.gif" alt="Grokgif7">

            </div>

    </section>
<!-- End of topic one------------------------------------------------------------------------------------------ -->
<!-- The second Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->

            <h1>3D modeling</h1>
        </div>
        <!-- now a three column grid of images -->

            <!-- one "card" which includes an image with a text below it -->
